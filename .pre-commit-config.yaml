minimum_pre_commit_version: "3.0.0"

repos:
  # Basic hygiene checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml

  # Go formatter
  - repo: local
    hooks:
      - id: gofmt
        name: gofmt
        language: system
        types: [go]
        entry: bash -lc 'gofmt -w "$@"'
        pass_filenames: true

  # Go linter (same as CI)
  - repo: https://github.com/golangci/golangci-lint
    rev: v2.10.1
    hooks:
    - id: golangci-lint
      args: ["--fix"]
      files: ^go_app/backend/.*\.go$
      pass_filenames: false
      entry: bash -lc 'cd go_app/backend && golangci-lint run --fix ./...'
