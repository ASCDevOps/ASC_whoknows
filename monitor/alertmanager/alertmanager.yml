global:
  resolve_timeout: 30s

route:
  receiver: "discord"

  routes:
    - match:
        severity: critical
      receiver: "discord"
      repeat_interval: 1h # sends notification to discord every hour

receivers:
  - name: "discord"
    webhook_configs:
      - url: "http://alertmanager-discord:9094"
        send_resolved: true
