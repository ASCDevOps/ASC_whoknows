global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

rule_files:
  - "../alertmanager/alerts.yml"

scrape_configs:
  # Prometheus self-monitoring
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # Node Exporter - system metrics from the app VM
  - job_name: "node"
    static_configs:
      - targets: ["20.251.163.132:9100"]  # <-- Replace with your app VM IP
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: "whoknows-app"

  # cAdvisor - Docker container metrics from the app VM
  - job_name: "cadvisor"
    static_configs:
      - targets: ["20.251.163.132:8081"]  # <-- Replace with your app VM IP
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: "whoknows-app"
