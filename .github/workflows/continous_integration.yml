name: Continous Integration

on:
  pull_request:
    branches:
      - "**"
  push:
    branches:
      - master

permissions:
  contents: read
  packages: read

  issues: write
  pull-requests: write

  statuses: write

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: go_app/backend

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go_app/backend/go.mod
          cache: true
          cache-dependency-path: go_app/backend/go.sum

      - name: Build
        run: go build ./...

      - name: Run tests
        run: go test ./... -v

  golangci:
    name: Lint
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: go_app/backend

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go_app/backend/go.mod

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20
        with:
          version: latest
          working-directory: go_app/backend
          only-new-issues: true # Can be changed so it looks through all files
