name: Hadolint

on:
  pull_request:
    paths:
      - 'go_app/backend/Dockerfile'

jobs:
  hadolint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Run Hadolint on Dockerfile
        uses: hadolint/hadolint-action@0931ae097296863e5f188b8c6a0c5f9b95f79793 # v3.3.0
        with:
          dockerfile: go_app/backend/Dockerfile
