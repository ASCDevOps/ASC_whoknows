{{ define "layout"}}
<!doctype html>
<title>¿Who Knows?</title>
<link rel="stylesheet" type="text/css" href="../static/style.css">
<div class="page">
  <div class="navigation">
  <nav>
    <h1><a id="nav-logo" href="../static/monkgroup.png">¿Who Knows?</a></h1>

    {{ if .User }}
    <a id="nav-logout" href="/logout">Log out [{{ .User.Username }}]</a>
    {{ else }}
    <a id="nav-login" href="/login">Log in</a>
  <a id="nav-register" href="register.html">Register</a>
    {{ end }}
  </nav>
  </div>

    {{ if .Flashes}}
      <ul class="flashes">
      {{ range .Flashes }}
        <li>{{ . }}</li>
      {{ end }}
      </ul>
    {{ end }}

  <div class="body">
  {{ block "body" . }}{{ end }}
  </div>

  <div class="footer">
    <span>¿Who Knows? &copy; 2009</span>
    <a href="/about">About</a>
  </div>
</div>
{{ end }}
