{{ define "layout" }}
<!doctype html>
<html lang="en">
<head>
  <title>¿Who Knows?</title>
  <link rel="stylesheet" type="text/css" href="/static/style.css">
  <link rel="icon" type="image/png" href="/static/monkgroup.png">
</head>
<body>
<div class="page">
  <div class="navigation">
    <nav>
      <div class="site-title">
        <a id="nav-logo" href="/search">¿Who Knows?</a>
      </div>

      <div class="nav-right">
        {{ if .User }}
          <a id="nav-logout" href="/api/logout">Log out</a>
        {{ else }}
          <a id="nav-login" href="/login">Log in</a>
          <a id="nav-register" href="/register">Register</a>
        {{ end }}
      </div>
    </nav>
  </div>

  {{ if .Flash }}
    <ul class="flashes">
      <li>{{ .Flash }}</li>
    </ul>
  {{ end }}

  <div class="body">
    {{ template "body" . }}
  </div>

  <div class="footer">
    <span>¿Who Knows? &copy; 2009</span>
    <a href="/about">About</a>
  </div>
</div>
</body>
</html>
{{ end }}
