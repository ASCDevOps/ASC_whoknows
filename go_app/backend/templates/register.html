{{ define "body" }}
<h1>Sign Up</h1>

{{ if .Error }}
<div class="error"><strong>Error:</strong> {{ .Error }}</div>
{{ end }}

<form action="/api/register" method="POST">
  <dl>
    <dt><label for="username">Username:</label></dt>
    <dd><input id="username" type="text" name="username" size="30" autocomplete="username"></dd>

    <dt><label for="email">E-Mail:</label></dt>
    <dd><input id="email" type="email" name="email" size="30" autocomplete="email"></dd>

    <dt><label for="password">Password:</label></dt>
    <dd><input id="password" type="password" name="password" size="30" autocomplete="new-password"></dd>

    <dt><label for="password2">Password (repeat):</label></dt>
    <dd><input id="password2" type="password" name="password2" size="30" autocomplete="new-password"></dd>
  </dl>

  <div class="actions">
    <input type="submit" value="Sign Up">
  </div>
</form>
{{ end }}
