{{ define "body" }}
<h1>Log In</h1>

{{ if .Error }}
<div class="error"><strong>Error:</strong> {{ .Error }}</div>
{{ end }}

<form>
  <dl>
    <dt><label for="username">Username:</label></dt>
    <dd><input id="username" type="text" name="username" size="30" autocomplete="username"></dd>

    <dt><label for="password">Password:</label></dt>
    <dd><input id="password" type="password" name="password" size="30" autocomplete="current-password"></dd>
  </dl>

  <div class="actions">
    <input type="submit" id="login-button" value="Log In">
  </div>
</form>

<script>
document.querySelector("form").addEventListener("submit", async (e) => {
    e.preventDefault();
    const res = await fetch("/api/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            username: document.querySelector("[name=username]").value,
            password: document.querySelector("[name=password]").value,
        })
    });
    if (res.ok) {
        window.location.href = "/";
    } else {
        const data = await res.json();
        alert(data.message || "Login failed");
    }
});
</script>
{{ end }}
